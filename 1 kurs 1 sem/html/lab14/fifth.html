<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Пятое</title>
</head>
<body>
    <svg width="1400" height="300">
         <defs>
            <linearGradient id="g">
                <stop offset="0%" stop-color="green" />

                <stop offset="100%" stop-color="orange" />
            </linearGradient>
        </defs>
            <circle cx="110" cy="110" r="100" fill="blue" stroke="blue" stroke-width="5" >
                <animate attributeName="stroke" values="blue;green;orange;red;yellow;blue" dur="4s" begin="mouseover" repeatCount="1"/>
                </circle>
            <rect x="250" y="10" height="250" width="250"  fill="red" stroke="blue" stroke-width="5" stroke-dashoffset="1000" stroke-dasharray="1000">
                <animate attributeName="stroke-dashoffset" values="1000;0;" dur="2.5s"         repeatCount="indefinite"
/>
                
            </rect>

            <ellipse cx="700" cy="100" rx="180" ry="100" fill="green" >
                            <animate attributeName="fill" values="pink;purple;green;" dur="5s" begin="click" fill="freeze" />
                </ellipse>
            <polygon points="1100 0 1200 200 1000 200 1100 0 " fill="url(#g)" />
        </svg>
</body>
</html>
