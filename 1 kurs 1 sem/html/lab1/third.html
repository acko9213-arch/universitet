<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Данные студента</title>
</head>
<body>
    <form>
        <table border="2"  rules="none" cellpadding="3"  align="center">
            <tr>
                <th><font size="5">
                    Данные студента</font>
                </th>
            </tr>
            <tr>
                <td align="right">
                    Имя студента
                   
                </td>
                <td>
                    <input type="text"  required placeholder="обязательно заполнить">
                </td>
            </tr>
            <tr>
                <td align="right">
                  Отчество студента
                    
                </td>
                <td>
                    <input type="text"  required placeholder="обязательно заполнить">
                </td>
            </tr>
            <tr>
                <td align="right"> 
                    Фамилия студента
                    
                </td>
                <td>
                    <input type="text"   required placeholder="обязательно заполнить">
                </td>
            </tr>
            <tr>
                <td align="right">
                    Адрес почты
                </td>
                <td>
                    <input type="email"  >
                </td>
            </tr>
            <tr>
                <td align="right">
                   Контактный номер
                </td>
                <td>
                    <input type="tel"  >
                </td>
            </tr>
            <tr>
                <td align="right">
                    Какую социальную<br> сеть вы используете?
                </td>
                <td align="right">
                    <input type="checkbox"  value="vk" id="vk">
                    <label for="vk">VK</label>
                    
                    <input type="checkbox"  value="facebook" id="facebook">
                    <label for="facebook">Facebook</label>
                    
                    <input type="checkbox"  value="instagram" id="instagram">
                    <label for="instagram">Instagram</label>
                </td>
            </tr>
            <tr>
                <td>
                    <input type="submit" value="отправить">
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
